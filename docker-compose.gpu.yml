# GPU deployment — standalone (does NOT need docker-compose.yml). Identical to
# docker-compose.yml except for the GPU-specific bits, marked "# GPU:" below.
#   GPU:  docker compose -f docker-compose.gpu.yml up -d
# Requires the NVIDIA driver + NVIDIA Container Toolkit on the host (see
# Dockerfile.gpu). Runtime state is kept in named volumes so it survives
# down/up and image bumps. If the GHCR package is private, `docker login
# ghcr.io` first.
services:
  faster-whisper-backend:
    # GPU: CUDA image variant published by CI from Dockerfile.gpu (vs :latest).
    image: ghcr.io/v3djg6gl/faster-whisper-backend:latest-gpu
    container_name: faster-whisper-backend
    # Runs as a non-root user. Set PUID/PGID (e.g. in .env next to this file)
    # to pick the user/group — no rebuild needed; the image ships /data and
    # /models writable by any UID, so a FRESH volume just works.
    # UPGRADING an existing deployment whose volumes were created by an older
    # (root-running) image: the state files inside are owned by root — re-own
    # them once (with your PUID:PGID), then `up -d` as usual:
    #   docker compose -f docker-compose.gpu.yml run --rm --user root \
    #     faster-whisper-backend chown -R 1000:1000 /data /models
    user: "${PUID:-1000}:${PGID:-1000}"
    # GPU: expose all NVIDIA GPUs (Compose v2 reservation, == `docker run --gpus all`).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # To build the GPU image locally instead of pulling from GHCR, uncomment:
    # build:
    #   context: .
    #   dockerfile: Dockerfile.gpu
    ports:
      # To serve on another port, set WHISPER_SERVER_PORT to match AND change
      # both sides here, e.g. "9000:9000".
      - "8000:8000"
    # Optional: tune any WHISPER_* setting from a local .env file (copy it from
    # .env.example). Values in `environment:` below and real env vars win over it.
    # env_file:
    #   - .env
    environment:
      # Pin the runtime state under /data (volumes below) instead of the repo
      # dir, so the image stays stateless. Every other WHISPER_* setting can be
      # added here too — see .env.example for the full list and defaults.
      WHISPER_CONFIG_LOCAL: /data/config.local.json
      WHISPER_API_KEYS_DB: /data/api_keys.local.sqlite3
      WHISPER_SESSIONS_DB: /data/sessions.local.sqlite3
      WHISPER_REPORTS_DB: /data/reports.local.sqlite3
      WHISPER_RECENT_TRANSCRIPTIONS_DB: /data/recent_transcriptions.local.sqlite3
      WHISPER_USAGE_DB: /data/usage.local.sqlite3
      WHISPER_CAPTURES_DB: /data/captures.local.sqlite3
      WHISPER_CAPTURES_DIR: /data/captures
      WHISPER_LOG_FILE: /data/logs/whisper.log
      WHISPER_DOWNLOAD_ROOT: /models
      # Auto-converted CT2 models (if AUTO_CONVERT_HF_MODELS is enabled) land
      # on the persistent models volume instead of the ephemeral ~/.cache.
      WHISPER_CONVERTED_MODELS_DIR: /models/converted
      # HF download backend (hf_xet) writes its cache + logs under HF_HOME;
      # unset it defaults to ~/.cache, which fails ("Permission denied") when
      # the platform runs the container as a non-root UID with HOME=/. Point it
      # at the writable, persistent /models volume so the cache survives too.
      HF_HOME: /models
      # Disable the Xet transfer backend: on restrictive/proxied networks its
      # CAS endpoint gets rate-limited (429) and stalls (concurrency throttles
      # to 1 and the model download hangs). "1" forces the plain HTTPS/CDN path,
      # which is slower but reliable. Remove this to re-enable Xet if your egress
      # to cas-bridge/transfer.xethub.hf.co is unrestricted.
      HF_HUB_DISABLE_XET: "1"
      # GPU: MODEL_DEVICE already defaults to "cuda" + float16 (config.py), so no
      # extra env is needed. To pin a specific GPU on a multi-GPU host, uncomment:
      # WHISPER_DEVICE_INDEX: "0"
      # --- Behind a reverse proxy (remote access) ---------------------------
      # The admin pages (/settings, /quick-config, /stats, /captures, /reports)
      # are gated by client IP. Behind a proxy the app sees the PROXY's IP, so
      # those pages 403 ("host not in allowlist"). To gate on the REAL client
      # IP, trust the proxy's X-Forwarded-For: set FORWARDED_ALLOW_IPS to the
      # proxy's IP/subnet (uvicorn then rewrites the client IP). Never "*"
      # unless the container is unreachable except via the proxy (spoofing).
      # Then allowlist your real client IP(s) below. ALSO set a bootstrap admin
      # key — without it the server runs in OPEN mode (everyone is admin).
      # FORWARDED_ALLOW_IPS: "172.16.0.0/12"          # your proxy IP/subnet
      # WHISPER_ADMIN_WEBUI_ALLOWED_HOSTS: "203.0.113.7"   # admin pages (/settings, /docs); default loopback-only
      # WHISPER_USER_WEBUI_ALLOWED_HOSTS: "203.0.113.7"    # user pages (/stats, /logs, …); default OPEN — narrow to restrict
      # WHISPER_SESSION_COOKIE_SECURE: "1"            # required when served over HTTPS
      # Optional: bootstrap the first admin without the UI. Prefer the *_FILE
      # form so the secret stays out of `docker inspect` / the process env:
      # WHISPER_BOOTSTRAP_ADMIN_KEY_FILE: /run/secrets/bootstrap_admin_key
    volumes:
      - whisper-data:/data
      - whisper-models:/models
    restart: unless-stopped
    # Mount file-based secrets and reference them with the *_FILE vars above.
    # secrets:
    #   - bootstrap_admin_key

volumes:
  whisper-data:
  whisper-models:

# secrets:
#   bootstrap_admin_key:
#     file: ./secrets/bootstrap_admin_key.txt
