name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: tests (${{ matrix.os }} py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu is the primary target and is exercised across the supported
        # Python range; windows is a single-version portability parity guard.
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13", "3.14.5"]
        include:
          # Pin to the redirect TARGET image: GitHub is migrating both
          # windows-latest AND windows-2025 to windows-2025-vs2026 (NOTICE until
          # 2026-06-15), so only the destination label avoids the notice. Bump
          # manually when deprecated — Renovate tracks actions, not runner labels.
          - os: windows-2025-vs2026
            python-version: "3.14.5"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (CPU base + test tools)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # Coverage is gated: the suite must exercise at least this percent of the
      # application modules, so coverage can only ratchet upward. A shortfall
      # fails this leg, which fails the `all-ci` gate below, which blocks
      # auto-merge / release publishing. Baseline measured at 66% on Linux;
      # set a few points lower so the Windows leg (which skips the POSIX-only
      # timezone tests) and minor per-version variance don't false-fail. Raise
      # this number as coverage grows — never lower it.
      - name: Run tests (with coverage gate)
        run: pytest -q --cov-fail-under=63

  # Single, stable status check to require in the branch ruleset. Matrix legs
  # ("tests (ubuntu-latest)", "tests (windows-latest)") expand/rename over time;
  # this gate aggregates them so the required check name never changes. It fails
  # unless EVERY matrix leg succeeded — so auto-merge (Renovate / GitHub) only
  # proceeds when the whole suite is green on all platforms.
  all-ci:
    name: all-ci
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Require all test matrix legs to succeed
        run: |
          echo "test job aggregate result: ${{ needs.test.result }}"
          test "${{ needs.test.result }}" = "success"

  # Build (and, off PRs, publish) the container images — only AFTER the test
  # gate is green. `needs: [all-ci]` means this job is skipped whenever the
  # suite fails, so a broken build never reaches ghcr.io. PRs build the images
  # to validate the Dockerfiles but do not push (forks lack packages: write and
  # we don't want PRs clobbering published tags); push to main / a v* tag
  # publishes.
  #
  # Two variants build in parallel from the same context:
  #   cpu — Dockerfile      → :latest, :v*, :sha-<short>          (CPU-only base)
  #   gpu — Dockerfile.gpu  → :latest-gpu, :v*-gpu, :sha-<short>-gpu
  #         (adds the CUDA 12 / cuDNN 9 wheels from requirements-gpu.txt)
  # The gpu suffix is applied to every tag via metadata-action's flavor.suffix.
  build:
    name: build image (${{ matrix.variant }})
    needs: [all-ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            dockerfile: Dockerfile
            suffix: ''
          - variant: gpu
            dockerfile: Dockerfile.gpu
            suffix: '-gpu'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute image name (ghcr requires lowercase)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/faster-whisper-backend" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        # Skipped for pull requests from forks, which cannot push packages.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.img.outputs.name }}
          # latest=false: we control the `latest` tag via the type=raw rule below
          # (default-branch only). suffix appends "-gpu" to every tag for the gpu
          # leg; onlatest=true ensures it reaches the raw `latest` tag too.
          flavor: |
            latest=false
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-variant cache scope so the cpu and gpu builds don't evict each other.
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
