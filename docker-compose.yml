# Deploy by pulling the published image from GHCR (default), or build locally.
#   CPU:  docker compose up -d
#   GPU:  docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# Runtime state is kept in named volumes so it survives down/up and image bumps.
# If the GHCR package is private, `docker login ghcr.io` first.
services:
  faster-whisper-backend:
    image: ghcr.io/v3djg6gl/faster-whisper-backend:latest
    container_name: faster-whisper-backend
    # To build the image locally instead of pulling from GHCR, uncomment:
    # build: .
    ports:
      # To serve on another port, set WHISPER_SERVER_PORT to match AND change
      # both sides here, e.g. "9000:9000".
      - "8000:8000"
    # Optional: tune any WHISPER_* setting from a local .env file (copy it from
    # .env.example). Values in `environment:` below and real env vars win over it.
    # env_file:
    #   - .env
    environment:
      # Pin the runtime state under /data (volumes below) instead of the repo
      # dir, so the image stays stateless. Every other WHISPER_* setting can be
      # added here too — see .env.example for the full list and defaults.
      WHISPER_API_KEYS_DB: /data/api_keys.local.sqlite3
      WHISPER_SESSIONS_DB: /data/sessions.local.sqlite3
      WHISPER_REPORTS_DB: /data/reports.local.sqlite3
      WHISPER_RECENT_TRANSCRIPTIONS_DB: /data/recent_transcriptions.local.sqlite3
      WHISPER_USAGE_DB: /data/usage.local.sqlite3
      WHISPER_CAPTURES_DB: /data/captures.local.sqlite3
      WHISPER_CAPTURES_DIR: /data/captures
      WHISPER_LOG_FILE: /data/logs/whisper.log
      WHISPER_DOWNLOAD_ROOT: /models
      # Optional: bootstrap the first admin without the UI. Prefer the *_FILE
      # form so the secret stays out of `docker inspect` / the process env:
      # WHISPER_BOOTSTRAP_ADMIN_KEY_FILE: /run/secrets/bootstrap_admin_key
    volumes:
      - whisper-data:/data
      - whisper-models:/models
    restart: unless-stopped
    # Mount file-based secrets and reference them with the *_FILE vars above.
    # secrets:
    #   - bootstrap_admin_key

volumes:
  whisper-data:
  whisper-models:

# secrets:
#   bootstrap_admin_key:
#     file: ./secrets/bootstrap_admin_key.txt
