<!DOCTYPE html>
<!--
  Live dictation demo for /v1/audio/transcriptions/stream.
  Self-contained (no CDNs): captures the mic via an AudioWorklet, downsamples to
  16 kHz mono s16le PCM, streams it over the WebSocket, and renders LocalAgreement
  stabilized partials (committed bold + provisional faded) plus append-only finals.
  Served as a plain static file — deliberately NOT through render_page, so there
  are no {{...}} placeholders to corrupt.
-->
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Dictation — faster-whisper</title>
<style>
  :root { --fs: 16px; --bg:#0f1115; --fg:#e6e6e6; --muted:#8b93a1; --accent:#4f8cff; --ok:#3fb950; --err:#f85149; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; }
  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    font-size: var(--fs); background: var(--bg); color: var(--fg);
    display: flex; flex-direction: column; min-height: 100%;
  }
  header { padding: 0.75rem 1rem; border-bottom: 1px solid #232733; display:flex; gap:1rem; align-items:center; flex-wrap:wrap; }
  header h1 { font-size: 1rem; margin:0; font-weight:600; }
  .controls { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }
  label { font-size: 0.8rem; color: var(--muted); display:flex; gap:0.3rem; align-items:center; }
  input[type=text], input[type=password], select {
    font-family: Consolas, Menlo, monospace; font-size:0.85rem;
    background:#161922; color:var(--fg); border:1px solid #2a2f3a; border-radius:0.35rem; padding:0.3rem 0.45rem;
  }
  button {
    font-size:0.9rem; padding:0.45rem 1rem; border-radius:0.4rem; border:1px solid #2a2f3a;
    background:var(--accent); color:#fff; cursor:pointer;
  }
  button.stop { background:var(--err); }
  button:disabled { opacity:0.5; cursor:default; }
  #status { font-size:0.8rem; color:var(--muted); margin-left:auto; }
  #status.live { color: var(--ok); }
  #status.error { color: var(--err); }
  main { flex:1; padding:1rem; overflow:auto; }
  #doc {
    white-space: pre-wrap; word-break: break-word; line-height:1.6;
    font-size:1.05rem; min-height:6rem;
  }
  #final { color: var(--fg); }                 /* committed: locked, append-only */
  #tail { color:#aeb6c2; }                      /* provisional: settled this utterance, may still firm up */
  #partial { color: var(--muted); }
  #partial .committed { color:#c8ccd4; }
  #partial .pending { color:#5b6270; opacity:0.6; font-style:italic; }
  footer { padding:0.5rem 1rem; border-top:1px solid #232733; font-size:0.75rem; color:var(--muted); }
  code { font-family: Consolas, Menlo, monospace; }
</style>
</head>
<body>
<header>
  <h1>Live Dictation</h1>
  <div class="controls">
    <label>Mode
      <select id="mode" title="Streaming: live partials over a WebSocket. Batch: record, then POST the whole clip to /v1/audio/transcriptions (one-shot, full pipeline).">
        <option value="stream">streaming (live)</option>
        <option value="batch">batch (record &amp; send)</option>
      </select>
    </label>
    <label>Server <input type="text" id="server" placeholder="(this page's host)" size="24"
                         title="Backend base URL or host:port, e.g. https://whisper.example.com or 192.168.1.50:8000. Empty = same host that served this page."></label>
    <label>Model <input type="text" id="model" value="whisper-1" size="13"></label>
    <label>Lang <input type="text" id="lang" value="de" size="3"></label>
    <label>Format
      <select id="format">
        <option value="json">json</option>
        <option value="verbose_json">verbose_json</option>
      </select>
    </label>
    <label>API&nbsp;key <input type="password" id="key" placeholder="(open mode)" size="12"></label>
    <button id="toggle">Start dictation</button>
  </div>
  <span id="status">idle</span>
</header>
<main>
  <div id="doc"><span id="final"></span><span id="tail"></span><span id="partial"></span></div>
</main>
<footer>
  Speak commands: <code>Punkt</code> → . &nbsp; <code>Komma</code> → , &nbsp;
  <code>neue Zeile</code> → newline &nbsp; <code>Klammer auf/zu</code> → ( )
  <div id="note"></div>
</footer>

<script>
(() => {
  "use strict";
  const TARGET_SR = 16000;
  const FRAME_SAMPLES = 4096;           // ~256 ms per WS binary frame at 16 kHz
  const $ = (id) => document.getElementById(id);
  const finalEl = $("final"), tailEl = $("tail"), partialEl = $("partial"),
        statusEl = $("status"), toggleBtn = $("toggle");

  let ws = null, audioCtx = null, workletNode = null, mediaStream = null, running = false;
  let resampleCarry = 0.0, resamplePos = 0.0, pcmBuf = new Int16Array(FRAME_SAMPLES), pcmLen = 0;
  // Batch mode: record the whole clip with MediaRecorder, POST it in one shot.
  let recorder = null, recStream = null, recChunks = [];

  function setStatus(text, cls) { statusEl.textContent = text; statusEl.className = cls || ""; }
  const mode = () => $("mode").value;

  // --- connection target + persisted settings ---------------------------------
  const PREF_FIELDS = ["mode", "server", "model", "lang", "format", "key"];

  // Resolve the "Server" field to a ws[s]:// base URL. Accepts a full
  // ws(s)/http(s) URL or a bare host[:port]; empty falls back to this page's host.
  function wsBase() {
    let s = ($("server").value || "").trim().replace(/\/+$/, "");
    const pageScheme = location.protocol === "https:" ? "wss" : "ws";
    if (!s) return pageScheme + "://" + location.host;
    if (/^wss?:\/\//i.test(s)) return s;
    if (/^https:\/\//i.test(s)) return "wss://" + s.slice(8);
    if (/^http:\/\//i.test(s)) return "ws://" + s.slice(7);
    return pageScheme + "://" + s;            // bare host[:port]
  }

  // Resolve the "Server" field to an http[s]:// base URL (batch POST target).
  // Empty → same origin that served this page (no CORS); a remote host needs
  // CORS enabled on the backend (the WS path is not subject to CORS).
  function httpBase() {
    let s = ($("server").value || "").trim().replace(/\/+$/, "");
    if (!s) return location.origin;
    if (/^https?:\/\//i.test(s)) return s;
    if (/^wss:\/\//i.test(s)) return "https://" + s.slice(6);
    if (/^ws:\/\//i.test(s)) return "http://" + s.slice(5);
    return location.protocol + "//" + s;      // bare host[:port], match page scheme
  }

  function loadPrefs() {
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem("dictatePrefs") || "{}"); } catch {}
    for (const f of PREF_FIELDS) if (saved[f] != null && $(f)) $(f).value = saved[f];
  }
  function savePrefs() {
    const o = {};
    for (const f of PREF_FIELDS) if ($(f)) o[f] = $(f).value;
    try { localStorage.setItem("dictatePrefs", JSON.stringify(o)); } catch {}
  }

  // AudioWorklet processor: forward raw Float32 mic frames to the main thread.
  const workletSrc = `
    class Cap extends AudioWorkletProcessor {
      process(inputs) {
        const ch = inputs[0][0];
        if (ch) this.port.postMessage(ch.slice(0));
        return true;
      }
    }
    registerProcessor('cap', Cap);
  `;

  // Linear-resample incoming Float32 (at ctxRate) down to TARGET_SR, pack to
  // int16, and ship full frames as WS binary.
  function pushSamples(float32, srcRate) {
    const ratio = srcRate / TARGET_SR;
    let pos = resamplePos;
    while (pos < float32.length) {
      const i = Math.floor(pos);
      const frac = pos - i;
      const a = float32[i];
      const b = i + 1 < float32.length ? float32[i + 1] : resampleCarry;
      let s = a + (b - a) * frac;
      s = Math.max(-1, Math.min(1, s));
      pcmBuf[pcmLen++] = s < 0 ? s * 0x8000 : s * 0x7fff;
      if (pcmLen === FRAME_SAMPLES) {
        if (ws && ws.readyState === 1) ws.send(pcmBuf.buffer.slice(0));
        pcmLen = 0;
      }
      pos += ratio;
    }
    resampleCarry = float32[float32.length - 1];
    resamplePos = pos - float32.length;
  }

  function renderPartial(committed, pending) {
    partialEl.innerHTML = "";
    const c = document.createElement("span"); c.className = "committed"; c.textContent = committed || "";
    const p = document.createElement("span"); p.className = "pending"; p.textContent = pending || "";
    partialEl.append(c, p);
  }

  function onMessage(ev) {
    let m; try { m = JSON.parse(ev.data); } catch { return; }
    if (m.type === "ready") { setStatus("listening", "live"); }
    else if (m.type === "partial") { renderPartial(m.committed, m.pending); }
    else if (m.type === "final") {
      // committed = locked append-only prefix; tail = provisional trailing sentence.
      // Both are full strings (server re-sends them), so we replace, not append —
      // a post-processing seam rewrite can never desync the display.
      finalEl.textContent = m.committed || "";
      tailEl.textContent = m.tail || "";
      renderPartial("", "");
    }
    else if (m.type === "error") { setStatus("error: " + (m.message || m.code), "error"); }
  }

  function idleLabel() { return mode() === "batch" ? "Record" : "Start dictation"; }
  function resetToggleButton() {
    toggleBtn.disabled = false;
    toggleBtn.textContent = idleLabel();
    toggleBtn.classList.remove("stop");
  }

  // --- batch mode: record with MediaRecorder, POST the whole clip ---------------
  function pickMime() {
    const cands = ["audio/webm;codecs=opus", "audio/webm", "audio/ogg;codecs=opus", "audio/mp4"];
    for (const c of cands) {
      try { if (window.MediaRecorder && MediaRecorder.isTypeSupported(c)) return c; } catch {}
    }
    return "";
  }

  async function startBatch() {
    finalEl.textContent = ""; tailEl.textContent = ""; renderPartial("", "");
    recChunks = [];
    recStream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } });
    const mime = pickMime();
    recorder = mime ? new MediaRecorder(recStream, { mimeType: mime }) : new MediaRecorder(recStream);
    recorder.ondataavailable = (e) => { if (e.data && e.data.size) recChunks.push(e.data); };
    recorder.onstop = () => { sendBatch(); };
    recorder.start();
    setStatus("recording… (press Stop to transcribe)", "live");
  }

  function stopBatch() {
    // Stop the mic; recorder.onstop fires sendBatch(). Lock the button until the
    // POST resolves so the user can't re-enter mid-transcribe.
    toggleBtn.disabled = true;
    setStatus("transcribing…");
    try { if (recorder && recorder.state !== "inactive") recorder.stop(); } catch {}
    if (recStream) recStream.getTracks().forEach((t) => t.stop());
  }

  async function sendBatch() {
    try {
      const type = (recorder && recorder.mimeType) || "audio/webm";
      const blob = new Blob(recChunks, { type });
      recorder = null;
      if (!blob.size) { setStatus("no audio recorded", "error"); return; }
      const ext = type.includes("ogg") ? "ogg" : (type.includes("mp4") ? "mp4" : "webm");
      const fd = new FormData();
      fd.append("file", blob, "dictation." + ext);
      fd.append("model", $("model").value.trim() || "whisper-1");
      const lang = $("lang").value.trim(); if (lang) fd.append("language", lang);
      fd.append("response_format", $("format").value || "json");
      const key = $("key").value.trim();
      const headers = key ? { Authorization: "Bearer " + key } : {};
      const resp = await fetch(httpBase() + "/v1/audio/transcriptions", { method: "POST", headers, body: fd });
      if (!resp.ok) {
        setStatus("batch error " + resp.status + ": " + (await resp.text()).slice(0, 200), "error");
        return;
      }
      const ct = resp.headers.get("content-type") || "";
      let text;
      if (ct.includes("application/json")) {
        const j = await resp.json();
        text = (j && j.text != null) ? j.text : JSON.stringify(j, null, 2);
      } else {
        text = await resp.text();
      }
      finalEl.textContent = text || "";
      tailEl.textContent = ""; renderPartial("", "");
      setStatus("done", "live");
    } catch (err) {
      // A bare TypeError here is usually a cross-origin CORS block (remote Server).
      setStatus("batch failed: " + err.message
        + " — remote backend needs CORS: set WHISPER_CORS_ALLOW_ORIGINS (or open /dictate from it)", "error");
    } finally {
      running = false;
      if (recStream) { recStream.getTracks().forEach((t) => t.stop()); recStream = null; }
      resetToggleButton();
    }
  }

  async function start() {
    finalEl.textContent = ""; tailEl.textContent = ""; renderPartial("", "");
    const base = wsBase();
    const key = $("key").value.trim();
    const qs = key ? ("?key=" + encodeURIComponent(key)) : "";
    ws = new WebSocket(base + "/v1/audio/transcriptions/stream" + qs);
    ws.binaryType = "arraybuffer";
    setStatus("connecting to " + base + " …");

    ws.onopen = () => {
      ws.send(JSON.stringify({
        type: "config", model: $("model").value.trim() || "whisper-1",
        language: $("lang").value.trim() || null,
        response_format: $("format").value || "json",
        audio: { format: "pcm_s16le", sample_rate: TARGET_SR },
      }));
    };
    ws.onmessage = onMessage;
    ws.onerror = () => setStatus("socket error", "error");
    ws.onclose = () => { if (running) stop(); setStatus("closed"); };

    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const blobUrl = URL.createObjectURL(new Blob([workletSrc], { type: "application/javascript" }));
      await audioCtx.audioWorklet.addModule(blobUrl);
      const src = audioCtx.createMediaStreamSource(mediaStream);
      workletNode = new AudioWorkletNode(audioCtx, "cap");
      const sr = audioCtx.sampleRate;
      workletNode.port.onmessage = (e) => { if (running) pushSamples(e.data, sr); };
      src.connect(workletNode);
      // Keep the node pulling without routing mic to speakers (avoids feedback).
      const sink = audioCtx.createGain(); sink.gain.value = 0; workletNode.connect(sink); sink.connect(audioCtx.destination);
    } catch (err) {
      // Mic denied / worklet load failed after the socket already opened: tear
      // down the socket + audio graph so we don't leak a live server-side
      // session. Detach ALL socket handlers first so neither this close nor an
      // already-queued server "ready"/"error" message clobbers the caller's
      // "mic/socket failed: …" status with a stale "listening"/"closed"/"error".
      try { if (ws) { ws.onmessage = ws.onclose = ws.onerror = null; ws.close(); } } catch {}
      try { if (mediaStream) mediaStream.getTracks().forEach((t) => t.stop()); } catch {}
      try { if (audioCtx) audioCtx.close(); } catch {}
      ws = null; audioCtx = null; workletNode = null; mediaStream = null;
      throw err;
    }
  }

  function stop() {
    running = false;
    try { if (ws && ws.readyState === 1) { ws.send(JSON.stringify({ type: "stop" })); } } catch {}
    if (mediaStream) mediaStream.getTracks().forEach((t) => t.stop());
    if (audioCtx) audioCtx.close();
    ws = null; audioCtx = null; workletNode = null; mediaStream = null;
    pcmLen = 0; resamplePos = 0; resampleCarry = 0.0;
    resetToggleButton();
    setStatus("idle");
  }

  toggleBtn.addEventListener("click", async () => {
    const batch = mode() === "batch";
    if (running) { batch ? stopBatch() : stop(); return; }
    try {
      running = true;
      toggleBtn.textContent = batch ? "Stop & transcribe" : "Stop";
      toggleBtn.classList.add("stop");
      await (batch ? startBatch() : start());
    } catch (err) {
      running = false;
      setStatus((batch ? "mic/record failed: " : "mic/socket failed: ") + err.message, "error");
      resetToggleButton();
    }
  });

  // Switching mode while idle just relabels the button (Start dictation ⇄ Record).
  $("mode").addEventListener("change", () => { if (!running) resetToggleButton(); });

  // --- init: restore saved settings, persist on change, warn on insecure context ---
  loadPrefs();
  resetToggleButton();   // reflect the restored mode (Start dictation / Record)
  PREF_FIELDS.forEach((f) => { const el = $(f); if (el) el.addEventListener("change", savePrefs); });
  if (!window.isSecureContext) {
    const n = $("note");
    n.textContent = "⚠ Microphone needs a secure context (https or localhost). Open this page "
      + "from localhost (or over https) and set Server to your remote backend.";
    n.style.color = "var(--err)";
  } else {
    $("note").textContent = "Settings are saved in this browser's localStorage. "
      + "Batch mode records the clip and POSTs it to /v1/audio/transcriptions (one-shot); "
      + "for a remote Server, set WHISPER_CORS_ALLOW_ORIGINS on the backend (or open /dictate from it).";
  }
})();
</script>
</body>
</html>
